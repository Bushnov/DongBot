name: Auto tag from app version

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read app version from csproj
        id: app_version
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(sed -n 's:.*<Version>\(.*\)</Version>.*:\1:p' DongBot/DongBot.csproj | head -n 1)
          if [[ -z "${VERSION}" ]]; then
            echo "Could not read <Version> from DongBot/DongBot.csproj"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create tag if missing
        shell: bash
        run: |
          set -euo pipefail
          TAG="v${{ steps.app_version.outputs.version }}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists; skipping."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"
          echo "Created ${TAG}"
